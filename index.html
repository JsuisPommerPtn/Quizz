<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Quiz Evan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Poppins:wght@400;500;600&display=swap');

  :root{
    --bg-1:#1a1030;
    --bg-2:#2a1a45;
    --pink:#ff3d8a;
    --yellow:#ffd23f;
    --teal:#2dd4bf;
    --violet:#8b5cf6;
    --ink:#f4f0ff;
    --ink-dim:#c9bfe8;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    font-family:'Poppins', sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 10%, rgba(255,61,138,0.25), transparent 40%),
      radial-gradient(circle at 85% 20%, rgba(45,212,191,0.2), transparent 45%),
      radial-gradient(circle at 50% 90%, rgba(139,92,246,0.25), transparent 50%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2));
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    overflow-x:hidden;
    position:relative;
  }

  /* confetti dots ambiance */
  .dot{
    position:fixed;
    border-radius:50%;
    opacity:0.5;
    pointer-events:none;
    filter:blur(0.5px);
  }

  .stage{
    width:100%;
    max-width:560px;
    position:relative;
    z-index:2;
  }

  .eyebrow{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    letter-spacing:0.14em;
    text-transform:uppercase;
    font-size:13px;
    color:var(--yellow);
    text-align:center;
    margin-bottom:6px;
  }

  h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(32px,7vw,48px);
    text-align:center;
    margin:0 0 8px;
    line-height:1.05;
    background:linear-gradient(90deg, var(--pink), var(--yellow));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .subtitle{
    text-align:center;
    color:var(--ink-dim);
    font-size:15px;
    margin-bottom:28px;
  }

  .card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(10px);
    border-radius:24px;
    padding:28px 24px;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
    position:relative;
  }

  /* progress bar */
  .progress-track{
    height:8px;
    width:100%;
    background:rgba(255,255,255,0.1);
    border-radius:99px;
    overflow:hidden;
    margin-bottom:20px;
  }
  .progress-fill{
    height:100%;
    width:0%;
    border-radius:99px;
    background:linear-gradient(90deg, var(--teal), var(--pink));
    transition:width 0.4s ease;
  }

  .q-count{
    font-size:13px;
    color:var(--ink-dim);
    font-weight:500;
    margin-bottom:14px;
    display:flex;
    justify-content:space-between;
    font-family:'Baloo 2';
    letter-spacing:0.05em;
  }
  .q-count span.hot{color:var(--yellow);}

  .question{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:clamp(20px,4.5vw,25px);
    line-height:1.3;
    margin-bottom:22px;
    min-height:auto;
  }

  .options{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .opt{
    text-align:left;
    background:rgba(255,255,255,0.05);
    border:1.5px solid rgba(255,255,255,0.15);
    color:var(--ink);
    padding:14px 18px;
    border-radius:14px;
    font-family:'Poppins';
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    transition:transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }
  .opt:hover{
    border-color:var(--teal);
    background:rgba(45,212,191,0.1);
    transform:translateX(4px);
  }
  .opt:disabled{cursor:default;}
  .opt.correct{
    border-color:var(--teal);
    background:rgba(45,212,191,0.25);
    transform:none;
  }
  .opt.wrong{
    border-color:var(--pink);
    background:rgba(255,61,138,0.2);
    transform:none;
  }
  .opt.dim{opacity:0.45; transform:none;}

  .feedback{
    margin-top:16px;
    font-size:14px;
    color:var(--ink-dim);
    min-height:20px;
    font-style:italic;
  }

  .next-btn{
    margin-top:18px;
    width:100%;
    padding:14px;
    border-radius:14px;
    border:none;
    font-family:'Baloo 2';
    font-weight:700;
    font-size:16px;
    letter-spacing:0.02em;
    background:linear-gradient(90deg, var(--pink), var(--violet));
    color:white;
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease, transform 0.15s ease;
  }
  .next-btn.show{opacity:1; pointer-events:auto;}
  .next-btn:active{transform:scale(0.98);}

  /* result screen */
  .result{
    text-align:center;
    display:none;
  }
  .result.show{display:block;}
  .quiz-body.hidden{display:none;}

  .score-num{
    font-family:'Baloo 2';
    font-weight:800;
    font-size:64px;
    background:linear-gradient(90deg, var(--yellow), var(--pink));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    margin:6px 0;
  }
  .score-label{
    color:var(--ink-dim);
    font-size:14px;
    margin-bottom:18px;
  }
  .verdict{
    font-family:'Baloo 2';
    font-weight:700;
    font-size:22px;
    margin-bottom:10px;
  }
  .verdict-sub{
    color:var(--ink-dim);
    font-size:15px;
    margin-bottom:24px;
    line-height:1.5;
  }
  .restart-btn{
    padding:13px 26px;
    border-radius:14px;
    border:1.5px solid var(--teal);
    background:transparent;
    color:var(--teal);
    font-family:'Baloo 2';
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    transition:background 0.15s ease;
  }
  .restart-btn:hover{background:rgba(45,212,191,0.12);}

  footer{
    text-align:center;
    margin-top:18px;
    font-size:12px;
    color:rgba(201,191,232,0.5);
  }
</style>
</head>
<body>

<div class="stage">
  <div class="eyebrow">Quizz</div>
  <h1>Le quiz qui définira notre amitié</h1>
  <p class="subtitle">Est ce que tu me connais bien?</p>

  <div class="card">

    <div class="quiz-body" id="quizBody">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="q-count"><span id="qIndex">Question 1/11</span><span class="hot" id="qScore">0 pt</span></div>
      <div class="question" id="questionText"></div>
      <div class="options" id="optionsBox"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn">Question suivante →</button>
    </div>

    <div class="result" id="resultBox">
      <div class="score-label">Score final</div>
      <div class="score-num" id="finalScore">0/11</div>
      <div class="verdict" id="verdict"></div>
      <p class="verdict-sub" id="verdictSub"></p>
      <button class="restart-btn" id="restartBtn">Rejouer</button>
    </div>

  </div>
  <footer>Fait avec soin et amour par Evan </footer>
</div>

<script>
const questions = [
  {
    q: "Mon second prénom",
    options: ["Maxime", "Arthur", "Ethan", "J'en ai pas"],
    correct: 3,
    fact: "Pas de second prénom c'est surcoté"
  },
  {
    q: "Film préféré",
    options: ["Michael", "Léon", "Gran Turismo", "F1"],
    correct: 1,
    fact: "Léon ce chef d'oeuvre"
  },
  {
    q: "Musique préférée",
    options: ["TUTTI VA BENE - Toera", "ZADIG & VOLTAIRE - NFL SHARIF", "BITCH - LEFA et VALD", "LA MISERE EST SI BELLE - PNL"],
    correct: 2,
    fact: "BITCH - LEFA et VALD"
  },
  {
    q: "Artistes préférés",
    options: ["TOERA et HOUDI", "DAMSO et VALD", "ZUUKOU MAYZIE et WALLACE CLEAVER", "Ptite sœur et ASININE"],
    correct: 0,
    fact: "TOERA et HOUDI"
  },
  {
    q: "Couleur préférée",
    options: ["Violet", "Bleu", "Noir", "Marron"],
    correct: 0,
    fact: "Violet"
  },
  {
    q: "Nom de mon chien",
    options: ["Pralinette", "Prune", "Pistache", "Princesse"],
    correct: 3,
    fact: "Princesse "
  },
  {
    q: "Ce que je fais quand jsuis triste",
    options: ["Je roule en voiture", "Je regarde un film", "Je mange", "Je dors"],
    correct: 0,
    fact: "Je roule en voiture pour me vider la tête et écouter de la musique"
  },
  {
    q: "Nombre d'os que je me suis cassé",
    options: ["0", "1", "2", "5"],
    correct: 0,
    fact: "Aucun"
  },
  {
    q: "Mon rêve",
    options: ["Etre Riche", "Voyager avec mes proches et découvrir de nouvelles cultures", "Etre pilote automobile", "Etre chanteur"],
    correct: 1,
    fact: "Voyager avec mes proches et découvrir le monde"
  },
  {
    q: "Ma voiture de rêve",
    options: ["FORD EXPLORER 2016", "TOYOTA YARIS GR 2025", "BMW M3 E30", "CHEVROLET SUBURBAN 2026"],
    correct: 0,
    fact: "FORD EXPLORER 2016"
  },
  {
    q: "Mon surnom préféré",
    options: ["Ma biche", "Tonton", "Je déteste les surnoms", "Tant que j'apprécie la personne j'apprécie le surnom"],
    correct: 3,
    fact: "Tout dépend de qui me le donne."
  },
  {
    q: "Est-ce que je bats Merwan en 1v1",
    options: ["Oui", "Non", "50/50", "Faut se battre avec pour savoir"],
    correct: 0,
    fact: "Oui Ez"
  }
];

let current = 0;
let score = 0;
let answered = false;

const qIndexEl = document.getElementById('qIndex');
const qScoreEl = document.getElementById('qScore');
const questionText = document.getElementById('questionText');
const optionsBox = document.getElementById('optionsBox');
const feedback = document.getElementById('feedback');
const nextBtn = document.getElementById('nextBtn');
const progressFill = document.getElementById('progressFill');
const quizBody = document.getElementById('quizBody');
const resultBox = document.getElementById('resultBox');

function renderQuestion(){
  answered = false;
  feedback.textContent = '';
  nextBtn.classList.remove('show');
  const item = questions[current];
  qIndexEl.textContent = `Question ${current+1}/${questions.length}`;
  qScoreEl.textContent = `${score} pt`;
  progressFill.style.width = `${(current/questions.length)*100}%`;
  questionText.textContent = item.q;
  optionsBox.innerHTML = '';
  item.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt;
    btn.addEventListener('click', () => selectAnswer(i));
    optionsBox.appendChild(btn);
  });
}

function selectAnswer(i){
  if(answered) return;
  answered = true;
  const item = questions[current];
  const buttons = optionsBox.querySelectorAll('.opt');
  buttons.forEach((b, idx) => {
    b.disabled = true;
    if(idx === item.correct){
      b.classList.add('correct');
    } else if(idx === i){
      b.classList.add('wrong');
    } else {
      b.classList.add('dim');
    }
  });
  if(i === item.correct){
    score++;
    feedback.textContent = "Exact ! " + item.fact;
  } else {
    feedback.textContent = "Raté. " + item.fact;
  }
  qScoreEl.textContent = `${score} pt`;
  nextBtn.classList.add('show');
  nextBtn.textContent = current === questions.length - 1 ? "Voir le résultat →" : "Question suivante →";
}

nextBtn.addEventListener('click', () => {
  current++;
  if(current >= questions.length){
    showResult();
  } else {
    renderQuestion();
  }
});

function showResult(){
  progressFill.style.width = '100%';
  quizBody.classList.add('hidden');
  resultBox.classList.add('show');
  document.getElementById('finalScore').textContent = `${score}/${questions.length}`;
  const verdict = document.getElementById('verdict');
  const verdictSub = document.getElementById('verdictSub');
  if(score === questions.length){
    verdict.textContent = "DIGITAL TWIN";
    verdictSub.textContent = "SI TU A EU TOUTES LES REPONSES JUSTES C'EST QUE TU ES VRAIMENT UN DIGITAL TWIN";
  } else if(score >= questions.length - 2){
    verdict.textContent = "Tu me connais tres bien";
    verdictSub.textContent = "Ya 2-3 à revoir mais ça passe";
  } else if(score >= questions.length/10){
    verdict.textContent = "C'est pas ouf";
    verdictSub.textContent = "On va devoir avoir une longue discussion je pense";
  } else {
    verdict.textContent = "On est ami ?";
    verdictSub.textContent = "T'abuse la t'es sur on est ami ?";
  }
}

document.getElementById('restartBtn').addEventListener('click', () => {
  current = 0;
  score = 0;
  resultBox.classList.remove('show');
  quizBody.classList.remove('hidden');
  renderQuestion();
});

renderQuestion();

// ambient floating dots
const colors = ['#ff3d8a','#ffd23f','#2dd4bf','#8b5cf6'];
for(let i=0;i<18;i++){
  const dot = document.createElement('div');
  dot.className = 'dot';
  const size = 4 + Math.random()*8;
  dot.style.width = size+'px';
  dot.style.height = size+'px';
  dot.style.left = Math.random()*100+'vw';
  dot.style.top = Math.random()*100+'vh';
  dot.style.background = colors[Math.floor(Math.random()*colors.length)];
  document.body.appendChild(dot);
}
</script>
</body>
</html>
